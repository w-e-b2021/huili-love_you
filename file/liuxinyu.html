    <style>
      .heart {
        /* display: none; */
        position: absolute;
        top: 50%;
        left: 50%;
        transition: all 0.5s;
      }
      .left,
      .right {
        position: absolute;
        top: 0px;
        display: block;
        content: '';
        height: 39px;
        width: 26px;
        background-color: red;
        border-radius: 13px 13px 0 0;
      }
      .right {
        transform: rotate(45deg);
        left: 9px;
      }
      .left {
        transform: rotate(-45deg);
      }
      @keyframes move {
        0% {
          transform: translateY(0px);
        }
        100% {
          transform: translateY(200px);
        }
      }
      .small-circle {
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        z-index: 100;
        height: 20px;
        width: 20px;
        border-radius: 50%;
        background-color: red;
      }
      @keyframes ground-move {
        0% {
          transform: scale(1, 1);
        }
        100% {
          transform: scale(700, 2);
        }
      }
      .ground {
        position: absolute;
        width: 2px;
        height: 2px;
        background-color: pink;
      }
    </style>

    <style>
      .moon {
        position: absolute;

        scrollbar-width: none; /* Firefox */
      }

      .img-list-item {
        width: 200px;

      }
    </style>
    <style>
      /* 重置默认样式 */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* 滚动容器：隐藏溢出内容 */
      .scroll-container {
        width: 100%;
        overflow: visible;
      }

      /* 包裹所有图片的滚动轨道 */
      .scroll-track,
      .scroll-track2 {
        height: 150px;
        position: absolute;

        display: flex;
        justify-content: space-between;
        width: 200%;
      }
      .scroll-track {
        left: 0;
        transform: translateX(50%);
        /* animation:
        scroll-left 10s linear,
        scroll-live 10s linear 10s infinite; */
      }
      .scroll-track2 {
        right: 0;
        transform: translateX(-50%);
        /* animation:
      scroll-right 10s linear,
      scroll-live-right 10s linear 10s infinite; */
      }
      /* 图片样式 */
      .scroll-track img,
      .scroll-track2 img {
        width: 10%;
        height: 100%;
        object-fit: cover;
      }

      /* 滚动动画：从右向左 */
      @keyframes scroll-left {
        0% {
          transform: translateX(50%);
        }
        100% {
          transform: translateX(0);
        }
      }
      /* 滚动动画：从右向左 */
      @keyframes scroll-live {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }
      /* 滚动动画：从左向右 */
      @keyframes scroll-right {
        0% {
          transform: translateY(103%) translateX(-50%);
        }
        100% {
          transform: translateY(103%) translateX(0);
        }
      }
      /* 滚动动画：从左向右 */
      @keyframes scroll-live-right {
        0% {
          transform: translateY(103%) translateX(0);
        }
        100% {
          transform: translateY(103%) translateX(50%);
        }
      }

      /* 为了实现无缝滚动，我们需要复制一份图片 */
      /* 实际上 .scroll-track 内容应包含两份相同的图片序列 */
    </style>
  </head>
