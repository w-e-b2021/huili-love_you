    <style>
      .heart {
        /* display: none; */
        position: absolute;
        top: 50%;
        left: 50%;
        transition: all 0.5s;
      }
      .left,
      .right {
        position: absolute;
        top: 0px;
        display: block;
        content: '';
        height: 39px;
        width: 26px;
        background-color: red;
        border-radius: 13px 13px 0 0;
      }
      .right {
        transform: rotate(45deg);
        left: 9px;
      }
      .left {
        transform: rotate(-45deg);
      }
      @keyframes move {
        0% {
          transform: translateY(0px);
        }
        100% {
          transform: translateY(200px);
        }
      }
      .small-circle {
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        z-index: 100;
        height: 20px;
        width: 20px;
        border-radius: 50%;
        background-color: red;
      }
      @keyframes ground-move {
        0% {
          transform: scale(1, 1);
        }
        100% {
          transform: scale(700, 2);
        }
      }
      .ground {
        position: absolute;
        width: 2px;
        height: 2px;
        background-color: pink;
      }
    </style>

    <style>
      @keyframes text-move {
        100% {
          transform: translateX(50%);
        }
      }
    
    </style>
    <style>
      /* 重置默认样式 */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* 滚动容器：隐藏溢出内容 */
      .scroll-container {
        width: 100%;
        overflow: visible;
      }

    </style>
  </head>
